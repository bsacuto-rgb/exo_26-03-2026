name: ETL_Automate_AWS

on:
  push:
    branches: [ main ]

jobs:
  run_etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth sqlalchemy psycopg2-binary sqlalchemy

      - name: Run ETL Script
        env:
          # On lie tes secrets GitHub aux variables attendues par ton script
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET: ${{ secrets.WORKSHEET }}
          GOOGLE_SA_KEY_JSON: ${{ secrets.GOOGLE_SA_KEY_JSON }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_DB: ${{ secrets.PG_DB }}
          PG_TABLE: test_jedha # Tu peux le mettre en secret ou l'écrire en dur ici
        run: python etl.py